name: Build Windows Desktop App

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write # Required for publishing releases and uploading assets

jobs:
  build:
    name: Build & Package Windows EXE
    runs-on: windows-latest

    steps:
      # Step 1: Checkout Repository Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js Environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Step 3: Install Project Dependencies
      - name: Install Dependencies
        run: |
          if (Test-Path package-lock.json) { Remove-Item package-lock.json }
          npm install --force

      # Step 4: Build React / Vite Frontend Production Files
      - name: Build React Frontend
        run: npm run build
        env:
          NODE_ENV: production
          DISABLE_HMR: true

      # Step 5: Package App with Electron Builder to generate .exe
      # Note: This step runs electron-builder. It expects "electron-builder" 
      # and "electron" to be installed in your devDependencies inside package.json.
      - name: Build & Package Windows Installer (.exe)
        run: npx electron-builder --windows --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 6: Upload Built Artifact (.exe) for PR/Pushes
      - name: Upload Windows EXE Installer
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/') != true
        with:
          name: windows-installer
          path: dist/*.exe
          retention-days: 7

      # Step 7: Create GitHub Release & Auto-Upload Asset (Only on Tag Push)
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
